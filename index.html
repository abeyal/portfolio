        </header>

        <main>
            <section id="repos">
                <h2>הפרויקטים שלי</h2>
                <div id="repos-list"></div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 אייל אברהם. כל הזכויות שמורות.</p>
        </footer>
    </div>

    <script src="script.js"></script>
